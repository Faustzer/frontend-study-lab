services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: studylab
      POSTGRES_USER: studylab
      POSTGRES_PASSWORD: studylab
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studylab"]
      interval: 2s
      timeout: 3s
      retries: 15

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://studylab:studylab@db:5432/studylab
    env_file:
      - path: ./backend/.env
        required: false
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

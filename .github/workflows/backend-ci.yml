name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml
  # No path filter here: "backend" is a required status check, and a
  # path-filtered pull_request trigger never reports on PRs that don't
  # touch backend/, leaving the check stuck pending and blocking merges.
  # Change detection below skips the actual work in that case instead.
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for backend changes
        id: changes
        working-directory: .
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.event.pull_request.base.ref }}"
          else
            base="${{ github.event.before }}"
          fi
          if git diff --name-only "$base" "${{ github.sha }}" | grep -qE '^(backend/|\.github/workflows/backend-ci\.yml)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.changes.outputs.run == 'true'
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        if: steps.changes.outputs.run == 'true'
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        if: steps.changes.outputs.run == 'true'
        run: ruff check app tests scripts

      - name: Type check (mypy)
        if: steps.changes.outputs.run == 'true'
        run: mypy

      - name: Tests
        if: steps.changes.outputs.run == 'true'
        run: pytest -q

      - name: Docker build
        if: steps.changes.outputs.run == 'true'
        run: docker build -t studylab-backend .

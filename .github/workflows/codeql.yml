name: CodeQL

# Replaces both dynamic workflows from repo settings (CodeQL default setup +
# Code Quality beta): one run per event does security and quality analysis.
# Requires default setup to be disabled in Settings -> Advanced Security,
# otherwise SARIF uploads from this workflow are rejected.
#
# Note: analysis-kinds is marked [Internal] in codeql-action until Code
# Quality reaches GA (announced for 2026-07-20); revisit if it breaks.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 4 * * 6' # weekly, Saturday 04:30 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            # code-quality does not support workflow files
            analysis-kinds: code-scanning
          - language: javascript-typescript
            analysis-kinds: code-scanning,code-quality
          - language: python
            analysis-kinds: code-scanning,code-quality

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          analysis-kinds: ${{ matrix.analysis-kinds }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

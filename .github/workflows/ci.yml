name: CI

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - nuxt.config.ts
      - tsconfig.json
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/ci.yml
  # No path filter here: "ci" is a required status check, and a
  # path-filtered pull_request trigger never reports on PRs that don't
  # touch these paths, leaving the check stuck pending and blocking
  # merges. Change detection below skips the actual work in that case.
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for frontend changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.event.pull_request.base.ref }}"
          else
            base="${{ github.event.before }}"
          fi
          if git diff --name-only "$base" "${{ github.sha }}" | grep -qE '^(frontend/|nuxt\.config\.ts|tsconfig\.json|package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|\.github/workflows/ci\.yml)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        if: steps.changes.outputs.run == 'true'

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.run == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.changes.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: steps.changes.outputs.run == 'true'
        run: pnpm run lint

      - name: Type check
        if: steps.changes.outputs.run == 'true'
        run: pnpm run typecheck

      - name: Unit tests
        if: steps.changes.outputs.run == 'true'
        run: pnpm run test:run

      - name: Build
        if: steps.changes.outputs.run == 'true'
        run: pnpm run build

name: Bot on mention
on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  bot:
    # The bot only responds to mentions maintained by Faustze on GitHub
    if: >
      github.actor == 'Faustze' &&
      contains(github.event.comment.body || github.event.issue.body, '@faustze-bot')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}
          fetch-depth: 0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.BOT_PAT }}
          trigger_phrase: "@faustze-bot"
          branch_prefix: "bot/"
          claude_args: >-
            --model claude-sonnet-5 --max-turns 30
            --allowedTools "Bash(pnpm test:*),Bash(pnpm run test:*),Bash(pnpm lint:*),Bash(pnpm run lint:*),Bash(pnpm typecheck:*),Bash(pnpm run typecheck:*),Bash(pnpm build:*),Bash(pnpm run build:*),Bash(pnpm install:*),Bash(pnpm exec vitest:*)"

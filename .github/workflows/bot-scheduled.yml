name: Bot scheduled / dispatched
on:
  schedule:
    # Moscow = UTC+3
    - cron: "0 21 * * *"   # 00:00 MSK — code health check
    # - cron: "0 23 * * *"   # 02:00 MSK — tests
    # - cron: "0 1 * * *"    # 04:00 MSK — code quality check
    # - cron: "0 3 * * *"    # 06:00 MSK — docs and i18n
  workflow_dispatch:
    inputs:
      prompt:
        description: "Task for bot"
        required: false

jobs:
  bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}
          fetch-depth: 0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pick task for this run
        id: task
        env:
          MANUAL_PROMPT: ${{ inputs.prompt }}
        run: |
          if [ -n "$MANUAL_PROMPT" ]; then
            PROMPT="$MANUAL_PROMPT"
          else
            case "${{ github.event.schedule }}" in
              "0 21 * * *") PROMPT='Run pnpm lint, pnpm typecheck, and pnpm test:run. If any checks fail, fix the issues and open a PR targeting the branch bot/nightly-health-<date>. Do not merge anything. If everything passes, finish without creating a PR.' ;;
              "0 23 * * *") PROMPT='Find one component or composable in frontend/ that has no unit tests (or has weak test coverage). Write tests following the existing style (Vitest + Vue Test Utils + MSW if needed), ensure pnpm test:run passes, and open a PR targeting the branch bot/nightly-tests-<date>. Do not work on more than one component per night. Do not merge anything.' ;;
              "0 1 * * *") PROMPT='Perform a small code quality refactoring in frontend/. Find one instance of duplicated code, dead code, or an outdated pattern, improve it carefully, run pnpm lint, pnpm typecheck, and pnpm test:run, then open a PR targeting the branch bot/nightly-quality-<date>. The change should be small and easy to review. Do not merge anything.' ;;
              "0 3 * * *") PROMPT='Check documentation and i18n consistency. Verify that the README matches the current scripts in package.json and that vue-i18n localization keys are consistent across all languages with no missing entries. If you find any inconsistencies, fix them and open a PR targeting the branch bot/nightly-docs-<date>. If everything is already consistent, finish without creating a PR.' ;;
              *) PROMPT='Run pnpm lint and pnpm test:run. If any checks fail, fix them and open a PR targeting the branch bot/nightly-<date>. Do not merge anything.' ;;
            esac
          fi
          {
            echo "prompt<<EOF"
            echo "$PROMPT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.BOT_PAT }}
          prompt: ${{ steps.task.outputs.prompt }}
          claude_args: >-
            --model claude-sonnet-5 --max-turns 40
            --allowedTools "Bash(pnpm test:*),Bash(pnpm run test:*),Bash(pnpm lint:*),Bash(pnpm run lint:*),Bash(pnpm typecheck:*),Bash(pnpm run typecheck:*),Bash(pnpm build:*),Bash(pnpm run build:*),Bash(pnpm install:*),Bash(pnpm exec vitest:*)"
